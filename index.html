<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game by Md Rahaman</title>
  <style>
    body { margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#1a1a2e; color:white; font-family:Arial; }
    canvas { border:3px solid #00ff00; background:#000; }
  .controls { margin-top:15px; }
    button { padding:10px 20px; margin:5px; font-size:16px; background:#00ff00; border:none; border-radius:5px; }
   .score-board { display:flex; gap:20px; }
  </style>
</head>
<body>
  <h1>🐍 Snake Game</h1>
  <div class="score-board">
    <h3>Score: <span id="score">0</span></h3>
    <h3>High Score: <span id="highScore">0</span></h3>
  </div>
  <canvas id="game" width="300" height="300"></canvas>
  <div class="controls">
    <button onclick="changeDir('up')">⬆️</button><br>
    <button onclick="changeDir('left')">⬅️</button>
    <button onclick="changeDir('down')">⬇️</button>
    <button onclick="changeDir('right')">➡️</button>
  </div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 15;
let snake = [{x: 9*box, y: 10*box}];
let food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
let d;
let score = 0;

// High Score লোড কর ফোন থেকে
let highScore = localStorage.getItem('snakeHighScore') || 0;
document.getElementById('highScore').innerText = highScore;

document.addEventListener('keydown', direction);
function direction(event){
  if(event.keyCode == 37 && d!= 'RIGHT') d = 'LEFT';
  else if(event.keyCode == 38 && d!= 'DOWN') d = 'UP';
  else if(event.keyCode == 39 && d!= 'LEFT') d = 'RIGHT';
  else if(event.keyCode == 40 && d!= 'UP') d = 'DOWN';
}
function changeDir(dir){
  if(dir == 'left' && d!= 'RIGHT') d = 'LEFT';
  else if(dir == 'up' && d!= 'DOWN') d = 'UP';
  else if(dir == 'right' && d!= 'LEFT') d = 'RIGHT';
  else if(dir == 'down' && d!= 'UP') d = 'DOWN';
}
function draw(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 300, 300);
  for(let i = 0; i < snake.length; i++){
    ctx.fillStyle = i == 0? '#00ff00' : '#00cc00';
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(food.x, food.y, box, box);
  let snakeX = snake[0].x;
  let snakeY = snake[0].y;
  if(d == 'LEFT') snakeX -= box;
  if(d == 'UP') snakeY -= box;
  if(d == 'RIGHT') snakeX += box;
  if(d == 'DOWN') snakeY += box;
  if(snakeX == food.x && snakeY == food.y){
    score++;
    document.getElementById('score').innerText = score;
    food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
  } else {
    snake.pop();
  }
  let newHead = {x: snakeX, y: snakeY};
  if(snakeX < 0 || snakeX >= 300 || snakeY < 0 || snakeY >= 300 || collision(newHead, snake)){
    clearInterval(game);
    
    // High Score চেক কর আর সেভ কর
    if(score > highScore){
      highScore = score;
      localStorage.setItem('snakeHighScore', highScore);
      document.getElementById('highScore').innerText = highScore;
      alert('New High Score! ' + score);
    } else {
      alert('Game Over! Score: ' + score);
    }
  }
  snake.unshift(newHead);
}
function collision(head, array){
  for(let i = 0; i < array.length; i++){
    if(head.x == array[i].x && head.y == array[i].y) return true;
  }
  return false;
}
let game = setInterval(draw, 200);
</script>
</body>
</html>
